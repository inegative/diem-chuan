<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Điểm chuẩn đại học</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.9.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f5f7;color:#1a1a2e;font-size:14px}
.app{max-width:1140px;margin:0 auto;padding:1.5rem 1rem}

/* Header */
.header{margin-bottom:1.25rem}
.header h1{font-size:20px;font-weight:600;color:#1a1a2e;display:flex;align-items:center;gap:8px;margin-bottom:3px}
.header h1 i{color:#3b5bdb;font-size:22px}
.header p{font-size:13px;color:#6b7280}

/* Loading */
#loadingState{text-align:center;padding:4rem 1rem;color:#6b7280}
#loadingState i{font-size:40px;display:block;margin-bottom:.75rem;color:#3b5bdb;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.25rem}
.stat{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:.85rem 1rem}
.stat-val{font-size:24px;font-weight:600;color:#1a1a2e}
.stat-lbl{font-size:12px;color:#6b7280;margin-top:2px}

/* Filters */
.filters{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:.75rem}
.filter-group label{font-size:12px;color:#6b7280;display:block;margin-bottom:4px;font-weight:500}
.filter-group select,.filter-group input{
  width:100%;font-size:13px;padding:7px 10px;
  border:1px solid #d1d5db;border-radius:7px;
  background:#f9fafb;color:#1a1a2e;outline:none;
  transition:border-color .15s,box-shadow .15s
}
.filter-group select:focus,.filter-group input:focus{
  border-color:#3b5bdb;box-shadow:0 0 0 3px rgba(59,91,219,.1);background:#fff
}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem;flex-wrap:wrap}
.toolbar-left{flex:1}
.toolbar-left span{font-size:13px;color:#6b7280}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;font-size:13px;
  border:1px solid #d1d5db;border-radius:7px;background:#fff;color:#374151;
  cursor:pointer;transition:background .12s,border-color .12s;font-weight:500}
.btn:hover{background:#f3f4f6;border-color:#9ca3af}
.btn i{font-size:15px}

/* Table */
.table-wrap{background:#fff;border:1px solid #e5e7eb;border-radius:10px;overflow:auto;max-height:560px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{position:sticky;top:0;z-index:2}
thead th{
  background:#f8fafc;padding:10px 12px;text-align:left;
  font-weight:600;font-size:12px;color:#6b7280;
  border-bottom:1px solid #e5e7eb;border-right:1px solid #f1f3f5;
  white-space:nowrap;cursor:pointer;user-select:none
}
thead th:last-child{border-right:none}
thead th:hover{color:#1a1a2e;background:#f1f3f9}
thead th .si{margin-left:3px;opacity:.35;font-size:10px}
thead th.active{color:#3b5bdb;background:#eef2ff}
thead th.active .si{opacity:1}
tbody tr{border-bottom:1px solid #f1f3f5;transition:background .08s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f8fafc}
tbody td{padding:9px 12px;color:#374151;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-right:1px solid #f1f3f5}
tbody td:last-child{border-right:none}

/* Score colors */
.score{font-weight:600;text-align:center;font-size:13px}
.score.high{color:#0d7a5f}
.score.mid{color:#92400e}
.score.low{color:#991b1b}
.score.na{color:#9ca3af;font-weight:400;font-size:12px}

/* Badges */
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:5px;font-weight:600;white-space:nowrap;border:1px solid transparent}
.b-a00{background:#dbeafe;color:#1e40af;border-color:#bfdbfe}
.b-c01{background:#dcfce7;color:#166534;border-color:#bbf7d0}
.b-d01{background:#ede9fe;color:#5b21b6;border-color:#ddd6fe}
.b-d07{background:#fef3c7;color:#92400e;border-color:#fde68a}
.b-x{background:#f3f4f6;color:#6b7280;border-color:#e5e7eb}

/* Pagination */
.pagination{display:flex;align-items:center;gap:6px;justify-content:center;margin-top:1rem;flex-wrap:wrap}
.pg-btn{padding:5px 11px;font-size:13px;border:1px solid #d1d5db;border-radius:6px;
  background:#fff;color:#374151;cursor:pointer;transition:background .1s;font-weight:500}
.pg-btn:hover:not(:disabled){background:#f3f4f6}
.pg-btn:disabled{opacity:.35;cursor:not-allowed}
.pg-btn.active{background:#3b5bdb;color:#fff;border-color:#3b5bdb}
.pg-info{font-size:12px;color:#9ca3af;padding:0 4px}

.empty{text-align:center;padding:3rem;color:#9ca3af;font-size:14px}
.empty i{font-size:40px;display:block;margin-bottom:.75rem;opacity:.3}

/* Error */
#errorState{display:none;text-align:center;padding:3rem;color:#991b1b;background:#fff;border:1px solid #fecaca;border-radius:10px}
#errorState i{font-size:40px;display:block;margin-bottom:.75rem}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1><i class="ti ti-school"></i>Điểm chuẩn đại học 2023–2025</h1>
    <p>Tổ hợp xét tuyển: A00 (Toán–Lý–Hóa) · C01 (Toán–Văn–Lý) · D01 (Toán–Văn–Anh) · D07 (Toán–Hóa–Anh)</p>
  </div>

  <div id="loadingState"><i class="ti ti-loader-2"></i>Đang tải dữ liệu...</div>
  <div id="errorState"><i class="ti ti-alert-circle"></i><b>Không tải được dữ liệu</b><br><span id="errorMsg"></span></div>

  <div id="mainUI" style="display:none">
    <div class="stats-row" id="statsRow"></div>

    <div class="filters">
      <div class="filter-group">
        <label>Tổ hợp môn</label>
        <select id="fltTohop">
          <option value="">Tất cả tổ hợp</option>
          <option value="A00">A00 – Toán, Lý, Hóa</option>
          <option value="C01">C01 – Toán, Văn, Lý</option>
          <option value="D01">D01 – Toán, Văn, Anh</option>
          <option value="D07">D07 – Toán, Hóa, Anh</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Trường</label>
        <select id="fltTruong"></select>
      </div>
      <div class="filter-group">
        <label>Phương thức</label>
        <select id="fltPT"></select>
      </div>
      <div class="filter-group">
        <label>Điểm chuẩn 2025 từ</label>
        <input type="number" id="fltMinDC" placeholder="VD: 24" min="0" max="30" step="0.25">
      </div>
      <div class="filter-group">
        <label>Tên ngành</label>
        <input type="text" id="fltNganh" placeholder="Nhập từ khóa...">
      </div>
    </div>

    <div class="toolbar">
      <div class="toolbar-left"><span id="resultCount"></span></div>
      <button class="btn" id="btnReset"><i class="ti ti-refresh"></i>Đặt lại</button>
      <button class="btn" id="btnExport"><i class="ti ti-download"></i>Xuất CSV</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr>
          <th style="width:76px" data-col="ma_to_hop">Tổ hợp <span class="si">↕</span></th>
          <th style="width:68px" data-col="ma_truong">Mã trường <span class="si">↕</span></th>
          <th style="width:190px" data-col="ten_truong">Tên trường <span class="si">↕</span></th>
          <th style="width:115px" data-col="phuong_thuc">Phương thức <span class="si">↕</span></th>
          <th data-col="ten_nganh">Tên ngành <span class="si">↕</span></th>
          <th style="width:72px;text-align:center" data-col="diem_chuan_2025">2025 <span class="si">↕</span></th>
          <th style="width:72px;text-align:center" data-col="diem_chuan_2024">2024 <span class="si">↕</span></th>
          <th style="width:72px;text-align:center" data-col="diem_chuan_2023">2023 <span class="si">↕</span></th>
        </tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<script>
const PAGE = 50;
let all=[], fil=[], sortCol='', sortAsc=true, page=1;
const $=id=>document.getElementById(id);

// ── Load CSV từ cùng thư mục ──
async function loadCSV() {
  try {
    const resp = await fetch('data.csv');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    let text = await resp.text();
    if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1); // strip BOM
    all = parseCSV(text);
    $('loadingState').style.display = 'none';
    $('mainUI').style.display = '';
    populate();
    filter();
  } catch(e) {
    $('loadingState').style.display = 'none';
    $('errorState').style.display = '';
    $('errorMsg').textContent = e.message;
  }
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = splitLine(lines[0]);
  const map = {
    'Mã tổ hợp':'ma_to_hop','Tổ hợp môn':'to_hop_mon',
    'Mã trường':'ma_truong','Tên trường':'ten_truong',
    'Phương thức':'phuong_thuc','Tên ngành':'ten_nganh',
    'Tổ hợp xét tuyển':'to_hop_xet',
    'Điểm chuẩn 2025':'diem_chuan_2025',
    'Điểm chuẩn 2024':'diem_chuan_2024',
    'Điểm chuẩn 2023':'diem_chuan_2023',
  };
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const parts = splitLine(lines[i]);
    if (parts.length < 3) continue;
    const obj = {};
    headers.forEach((h,idx) => { obj[map[h]||h] = (parts[idx]||'').trim(); });
    rows.push(obj);
  }
  return rows;
}

function splitLine(line) {
  const r=[]; let cur='', q=false;
  for (let i=0;i<line.length;i++) {
    const c=line[i];
    if(c==='"'){q=!q;}
    else if(c===','&&!q){r.push(cur.replace(/^"|"$/g,''));cur='';}
    else cur+=c;
  }
  r.push(cur.replace(/^"|"$/g,''));
  return r;
}

function populate() {
  const trs=[...new Set(all.map(r=>r.ten_truong).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'vi'));
  const pts=[...new Set(all.map(r=>r.phuong_thuc).filter(Boolean))].sort();
  const ts=$('fltTruong'); ts.innerHTML='<option value="">Tất cả trường</option>';
  trs.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;ts.appendChild(o);});
  const ps=$('fltPT'); ps.innerHTML='<option value="">Tất cả phương thức</option>';
  pts.forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;ps.appendChild(o);});
}

function filter() {
  const th=$('fltTohop').value, tr=$('fltTruong').value,
        pt=$('fltPT').value, kw=$('fltNganh').value.toLowerCase().trim(),
        mn=parseFloat($('fltMinDC').value)||0;
  fil = all.filter(r=>{
    if(th && r.ma_to_hop!==th) return false;
    if(tr && r.ten_truong!==tr) return false;
    if(pt && r.phuong_thuc!==pt) return false;
    if(mn>0){const v=parseFloat(r.diem_chuan_2025);if(isNaN(v)||v<mn)return false;}
    if(kw && !(r.ten_nganh||'').toLowerCase().includes(kw)) return false;
    return true;
  });
  if(sortCol) {
    fil.sort((a,b)=>{
      const av=a[sortCol]||'', bv=b[sortCol]||'';
      const an=parseFloat(av), bn=parseFloat(bv);
      if(!isNaN(an)&&!isNaN(bn)) return sortAsc?an-bn:bn-an;
      return sortAsc?av.localeCompare(bv,'vi'):bv.localeCompare(av,'vi');
    });
  }
  page=1; stats(); renderTable(); renderPag();
}

function stats() {
  const sc=fil.filter(r=>r.diem_chuan_2025).length;
  const trs=new Set(fil.map(r=>r.ma_truong)).size;
  const nums=fil.map(r=>parseFloat(r.diem_chuan_2025)).filter(n=>!isNaN(n));
  const avg=nums.length?(nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(2):'—';
  $('statsRow').innerHTML=`
    <div class="stat"><div class="stat-val">${fil.length.toLocaleString()}</div><div class="stat-lbl">Ngành</div></div>
    <div class="stat"><div class="stat-val">${trs}</div><div class="stat-lbl">Trường</div></div>
    <div class="stat"><div class="stat-val">${sc.toLocaleString()}</div><div class="stat-lbl">Có điểm 2025</div></div>
    <div class="stat"><div class="stat-val">${avg}</div><div class="stat-lbl">Điểm TB 2025</div></div>`;
  $('resultCount').textContent=`${fil.length.toLocaleString()} kết quả`;
}

function sc(v){const n=parseFloat(v);if(isNaN(n)||v==='')return'na';if(n>=26)return'high';if(n>=22)return'mid';return'low';}
function badge(m){const c={'A00':'b-a00','C01':'b-c01','D01':'b-d01','D07':'b-d07'};return c[m]||'b-x';}

function renderTable() {
  const s=(page-1)*PAGE, rows=fil.slice(s,s+PAGE), tb=$('tableBody');
  if(!rows.length){tb.innerHTML=`<tr><td colspan="8"><div class="empty"><i class="ti ti-mood-empty"></i>Không có kết quả phù hợp</div></td></tr>`;return;}
  tb.innerHTML=rows.map(r=>{
    const d5=r.diem_chuan_2025||'', d4=r.diem_chuan_2024||'', d3=r.diem_chuan_2023||'';
    return`<tr>
      <td><span class="badge ${badge(r.ma_to_hop)}">${r.ma_to_hop||''}</span></td>
      <td style="color:#6b7280;font-size:12px">${r.ma_truong||''}</td>
      <td title="${r.ten_truong||''}">${r.ten_truong||''}</td>
      <td style="color:#6b7280;font-size:12px" title="${r.phuong_thuc||''}">${r.phuong_thuc||''}</td>
      <td title="${r.ten_nganh||''}">${r.ten_nganh||''}</td>
      <td class="score ${sc(d5)}">${d5||'–'}</td>
      <td class="score ${sc(d4)}">${d4||'–'}</td>
      <td class="score ${sc(d3)}">${d3||'–'}</td>
    </tr>`;
  }).join('');
}

function renderPag() {
  const tot=Math.ceil(fil.length/PAGE), pg=$('pagination');
  if(tot<=1){pg.innerHTML='';return;}
  let h=`<button class="pg-btn" ${page===1?'disabled':''} onclick="go(${page-1})"><i class="ti ti-chevron-left"></i></button>`;
  const rng=[];
  for(let i=1;i<=tot;i++){if(i===1||i===tot||Math.abs(i-page)<=2)rng.push(i);else if(rng[rng.length-1]!=='…')rng.push('…');}
  rng.forEach(p=>{
    if(p==='…')h+=`<span class="pg-info">…</span>`;
    else h+=`<button class="pg-btn ${p===page?'active':''}" onclick="go(${p})">${p}</button>`;
  });
  h+=`<button class="pg-btn" ${page===tot?'disabled':''} onclick="go(${page+1})"><i class="ti ti-chevron-right"></i></button>`;
  h+=`<span class="pg-info">Trang ${page}/${tot}</span>`;
  pg.innerHTML=h;
}

function go(p){page=p;renderTable();renderPag();document.querySelector('.table-wrap').scrollTop=0;}

function exportCSV(){
  const keys=['ma_to_hop','to_hop_mon','ma_truong','ten_truong','phuong_thuc','ten_nganh','to_hop_xet','diem_chuan_2025','diem_chuan_2024','diem_chuan_2023'];
  const hdr=['Mã tổ hợp','Tổ hợp môn','Mã trường','Tên trường','Phương thức','Tên ngành','Tổ hợp xét tuyển','Điểm chuẩn 2025','Điểm chuẩn 2024','Điểm chuẩn 2023'];
  let csv='\uFEFF'+hdr.join(',')+'\n';
  fil.forEach(r=>{csv+=keys.map(k=>`"${(r[k]||'').replace(/"/g,'""')}"`).join(',')+'\n';});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download='diem_chuan_loc.csv';a.click();
}

// Events
document.querySelectorAll('thead th[data-col]').forEach(th=>{
  th.addEventListener('click',()=>{
    const col=th.dataset.col;
    sortAsc = sortCol===col ? !sortAsc : true;
    sortCol=col;
    document.querySelectorAll('thead th').forEach(t=>{t.classList.remove('active');t.querySelector('.si').textContent='↕';});
    th.classList.add('active');
    th.querySelector('.si').textContent=sortAsc?'↑':'↓';
    filter();
  });
});
['fltTohop','fltTruong','fltPT'].forEach(id=>$(id).addEventListener('change',filter));
['fltMinDC','fltNganh'].forEach(id=>$(id).addEventListener('input',filter));
$('btnReset').addEventListener('click',()=>{
  ['fltTohop','fltTruong','fltPT'].forEach(id=>$(id).value='');
  ['fltMinDC','fltNganh'].forEach(id=>$(id).value='');
  sortCol='';sortAsc=true;
  document.querySelectorAll('thead th').forEach(t=>{t.classList.remove('active');t.querySelector('.si').textContent='↕';});
  filter();
});
$('btnExport').addEventListener('click',exportCSV);

loadCSV();
</script>
</body>
</html>
